<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" fill="none" aria-hidden="true">
  <style>
    .map-outline {
      stroke: #B7A58A;
      stroke-width: 1.5;
      stroke-linejoin: round;
      stroke-linecap: round;
      fill: url(#tasMapGrad);
    }
    .map-outline--island { stroke-width: 1.25; opacity: 0.92; }
    .map-hub { fill: #DCC9AD; stroke: #FFFFFF; stroke-width: 1.5; animation: hubPulse 3.5s ease-in-out infinite; }
    .map-hub:nth-of-type(2) { animation-delay: 0.4s; }
    .map-hub:nth-of-type(3) { animation-delay: 0.8s; }
    .map-hub:nth-of-type(4) { animation-delay: 1.2s; }
    .map-client { fill: #B7A58A; opacity: 0.8; }
    .map-label {
      fill: #FFFFFF;
      font-family: "DM Sans", system-ui, sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.03em;
      paint-order: stroke fill;
      stroke: rgba(10,10,10,0.6);
      stroke-width: 4px;
      stroke-linejoin: round;
    }
    .map-island-label {
      fill: rgba(255,255,255,0.6);
      font-family: "DM Sans", system-ui, sans-serif;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    @keyframes hubPulse { 0%, 100% { opacity: 0.85; } 50% { opacity: 1; } }
  </style>
  <defs>
    <linearGradient id="tasMapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B7A58A" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#DCC9AD" stop-opacity="0.06"/>
    </linearGradient>
  </defs>
